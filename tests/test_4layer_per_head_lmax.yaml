# Test: 4-layer model with per_head_l_max and parity=true
#
# This combination triggered a bug: PerHeadConvNetLayer output irreps
# contained both 0e and 0o (with parity=true), but ScalarMLP requires
# exactly one irrep group (0e only).
#
# Fixed by filtering to ir.l == 0 and ir.p == 1 (even-parity scalars).

run: [train]

seed: 42
cutoff_radius: 4.0
model_type_names: [Cu, Al]
chemical_species: ${model_type_names}

dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: 5
  shuffle: true

data:
  _target_: nequip.data.datamodule.NequIPDataModule
  seed: ${seed}

  train_dataset:
    _target_: torch.utils.data.ConcatDataset
    datasets:
      - _target_: nequip.data.dataset.EMTTestDataset
        transforms:
          - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
            model_type_names: ${model_type_names}
            chemical_species_to_atom_type_map:
              Cu: Cu
          - _target_: nequip.data.transforms.NeighborListTransform
            r_max: ${cutoff_radius}
          - _target_: nequip_multihead.transforms.HeadStamper
            head_index: 0
        supercell: [2, 2, 2]
        seed: ${seed}
        num_frames: 20
        element: Cu

      - _target_: nequip.data.dataset.EMTTestDataset
        transforms:
          - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
            model_type_names: ${model_type_names}
            chemical_species_to_atom_type_map:
              Al: Al
          - _target_: nequip.data.transforms.NeighborListTransform
            r_max: ${cutoff_radius}
          - _target_: nequip_multihead.transforms.HeadStamper
            head_index: 1
        supercell: [2, 2, 2]
        seed: 43
        num_frames: 20
        element: Al

  val_dataset:
    - _target_: nequip.data.dataset.EMTTestDataset
      transforms:
        - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
          model_type_names: ${model_type_names}
          chemical_species_to_atom_type_map:
            Cu: Cu
        - _target_: nequip.data.transforms.NeighborListTransform
          r_max: ${cutoff_radius}
        - _target_: nequip_multihead.transforms.HeadStamper
          head_index: 0
      supercell: [2, 2, 2]
      seed: 999
      num_frames: 5
      element: Cu

  train_dataloader: ${dataloader}
  val_dataloader: ${dataloader}
  stats_manager:
    _target_: nequip_multihead.data.MultiHeadDataStatisticsManager
    type_names: ${model_type_names}

trainer:
  _target_: lightning.Trainer
  accelerator: gpu
  devices: 1
  max_epochs: 3
  check_val_every_n_epoch: 3
  log_every_n_steps: 5
  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      dirpath: ${hydra:runtime.output_dir}
      filename: best
      save_last: true

training_module:
  _target_: nequip.train.EMALightningModule
  loss:
    _target_: nequip.train.EnergyForceStressLoss
    per_atom_energy: true
    coeffs:
      total_energy: 1.0
      forces: 10.0
      stress: 1.0
  val_metrics:
    _target_: nequip.train.EnergyForceStressMetrics
  train_metrics: null
  optimizer:
    _target_: torch.optim.Adam
    lr: 0.01
  model:
    _target_: nequip_multihead.model.MultiHeadNequIPGNNModel
    seed: ${seed}
    model_dtype: float32
    type_names: ${model_type_names}
    r_max: ${cutoff_radius}
    l_max: 2
    parity: true
    num_layers: 4
    num_features: 16
    radial_mlp_depth: 1
    radial_mlp_width: 16
    avg_num_neighbors: ${training_data_stats:num_neighbors_mean}
    head_names: [full_Cu, scalar_Al]
    per_head_l_max:
      full_Cu: 2
      scalar_Al: 0
    per_type_energy_scales:
      full_Cu: ${training_data_stats:forces_rms}
      scalar_Al: ${training_data_stats:forces_rms}
    per_type_energy_shifts:
      full_Cu:
        Cu: 0.0
        Al: 0.0
      scalar_Al:
        Cu: 0.0
        Al: 0.0
