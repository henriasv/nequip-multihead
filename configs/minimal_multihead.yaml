# Minimal multi-head training example using EMT test data.
# Two heads (Cu, Al) with shared backbone.
#
# Usage:
#   nequip-train --config-dir=configs --config-name=minimal_multihead
#
# NOTE: This is a minimal example for testing. For real training,
# increase num_layers, num_features, max_epochs, and use real data.

run: [train]

seed: 42
cutoff_radius: 5.0
model_type_names: [Cu, Al]
chemical_species: ${model_type_names}

dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: 5
  shuffle: true

data:
  _target_: nequip.data.datamodule.NequIPDataModule
  seed: ${seed}

  train_dataset:
    _target_: torch.utils.data.ConcatDataset
    datasets:
      # Head 0: Cu data with energy + forces + stress
      - _target_: nequip.data.dataset.EMTTestDataset
        transforms:
          - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
            model_type_names: ${model_type_names}
            chemical_species_to_atom_type_map:
              Cu: Cu
          - _target_: nequip.data.transforms.NeighborListTransform
            r_max: ${cutoff_radius}
          - _target_: nequip_multihead.transforms.HeadStamper
            head_index: 0
        supercell: [2, 2, 2]
        seed: ${seed}
        num_frames: 20
        element: Cu

      # Head 1: Al data with energy + forces + stress
      - _target_: nequip.data.dataset.EMTTestDataset
        transforms:
          - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
            model_type_names: ${model_type_names}
            chemical_species_to_atom_type_map:
              Al: Al
          - _target_: nequip.data.transforms.NeighborListTransform
            r_max: ${cutoff_radius}
          - _target_: nequip_multihead.transforms.HeadStamper
            head_index: 1
        supercell: [2, 2, 2]
        seed: 43
        num_frames: 20
        element: Al

  val_dataset:
    - _target_: nequip.data.dataset.EMTTestDataset
      transforms:
        - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
          model_type_names: ${model_type_names}
          chemical_species_to_atom_type_map:
            Cu: Cu
        - _target_: nequip.data.transforms.NeighborListTransform
          r_max: ${cutoff_radius}
        - _target_: nequip_multihead.transforms.HeadStamper
          head_index: 0
      supercell: [2, 2, 2]
      seed: 999
      num_frames: 5
      element: Cu

  train_dataloader: ${dataloader}
  val_dataloader: ${dataloader}
  stats_manager:
    _target_: nequip_multihead.data.MultiHeadDataStatisticsManager
    type_names: ${model_type_names}

trainer:
  _target_: lightning.Trainer
  accelerator: gpu
  devices: 1
  max_epochs: 10
  check_val_every_n_epoch: 5
  log_every_n_steps: 5
  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      dirpath: ${hydra:runtime.output_dir}
      filename: best
      save_last: true

training_module:
  _target_: nequip.train.EMALightningModule
  loss:
    _target_: nequip.train.EnergyForceStressLoss
    per_atom_energy: true
    coeffs:
      total_energy: 1.0
      forces: 10.0
      stress: 1.0
  val_metrics:
    _target_: nequip.train.EnergyForceStressMetrics
  train_metrics: null
  optimizer:
    _target_: torch.optim.Adam
    lr: 0.01
  model:
    _target_: nequip_multihead.model.MultiHeadNequIPGNNModel
    seed: ${seed}
    model_dtype: float64
    type_names: ${model_type_names}
    r_max: ${cutoff_radius}
    l_max: 1
    parity: true
    num_layers: 2
    num_features: 16
    radial_mlp_depth: 1
    radial_mlp_width: 16
    avg_num_neighbors: ${training_data_stats:num_neighbors_mean}
    head_names: [Cu_head, Al_head]
    per_type_energy_scales:
      Cu_head: ${training_data_stats:forces_rms}
      Al_head: ${training_data_stats:forces_rms}
    per_type_energy_shifts:
      Cu_head:
        Cu: 0.0
        Al: 0.0
      Al_head:
        Cu: 0.0
        Al: 0.0
